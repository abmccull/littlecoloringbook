# campaign-taxonomy.yaml
#
# Machine-readable taxonomy. AGENTS.md defines the starting set of
# approved personas, voice families, pillars, and formats; this file
# holds the full working set (which can extend beyond AGENTS.md's
# "start with" lists as the business tests new segments and occasions).
#
# Invariants (enforced by packages/ads/src/__tests__/campaign-taxonomy.test.ts):
#   - Every persona name listed as "Approved" in AGENTS.md must appear here
#   - Every pillar in AGENTS.md "Core Content Pillars" must appear here
#   - No duplicate ids within any list
#   - bundled TS mirror (packages/ads/src/campaign-taxonomy.ts) matches this file

version: 2
brand:
  name: "Little Color Book"
  category: "personalized memory coloring books"
  primary_offer: "Free Sample Page"

offers:
  - id: free_sample
    name: "Free Sample Page"
    type: lead_magnet
  - id: pdf_30
    name: "30-Design PDF"
    type: digital
  - id: pdf_50
    name: "50-Design PDF"
    type: digital
  - id: pdf_100
    name: "100-Design PDF"
    type: digital
  - id: print_solo
    name: "Solo Keepsake"
    type: print
  - id: print_sibling_set
    name: "Sibling Set"
    type: print_bundle
  - id: print_sibling_trio
    name: "Sibling Trio"
    type: print_bundle

# Distribution platforms only. Gamma is a tool for affiliate kits,
# creator briefs, and internal reporting, not a distribution channel
# (see AGENTS.md "Tool Use Rules").
platforms:
  - tiktok
  - instagram_reels
  - meta_ads
  - pinterest
  - email

funnel_stages:
  - awareness
  - consideration
  - conversion
  - upsell
  - reorder

# Core Content Pillars — every asset must map to one of these five
# (AGENTS.md "Core Content Pillars"). This set is canonical.
pillars:
  - product_proof
  - emotional_resonance
  - occasion_intent
  - direct_response
  - social_proof

# Occasions the taxonomy may target. AGENTS.md "Occasion Intent" pillar
# lists birthdays, holidays, vacations, rainy day, travel, grandparent
# gifts, sibling set, and sibling conflict as the canonical anchors;
# additional real-world occasions (Mother's / Father's Day, pet books,
# new sibling arrival, etc.) are tested as extensions.
occasions:
  - evergreen
  - birthday
  - holiday
  - vacation
  - rainy_day
  - travel_activity
  - grandparent_gift
  - sibling_conflict
  - sibling_set
  - back_to_school
  - mothers_day
  - fathers_day
  - pet_book
  - memorial_keepsake
  - new_sibling_arrival
  - adoption_day
  - deployment_keepsake
  - wedding_favor
  - first_day_of_school
  - in_memory_pet

# Personas. AGENTS.md names 6 "start with" personas — they must all
# appear here. Additional personas listed below are extensions being
# tested for the full family-gift market (dads, grandpas, extended
# family, occasion-specific gift givers, adult self-purchase).
personas:
  # — AGENTS.md approved "start with" set (6)
  - id: warm_millennial_mom
    name: "Warm Millennial Mom"
    family_role: parent
    gender_lean: female
  - id: organized_practical_mom
    name: "Organized Practical Mom"
    family_role: parent
    gender_lean: female
  - id: emotional_keepsake_mom
    name: "Emotional Keepsake Mom"
    family_role: parent
    gender_lean: female
  - id: grandma_gift_buyer
    name: "Grandma Gift Buyer"
    family_role: grandparent
    gender_lean: female
  - id: homeschool_screenfree_mom
    name: "Homeschool or Screen-Free Mom"
    family_role: parent
    gender_lean: female
  - id: lifestyle_gift_creator
    name: "Lifestyle Creator or Gift Recommender"
    family_role: influencer
    gender_lean: any

  # — Extensions: dads
  - id: dad_primary_shopper
    name: "Dad Primary Shopper"
    family_role: parent
    gender_lean: male
  - id: military_dad_keepsake
    name: "Military / Deployed Parent Keepsake"
    family_role: parent
    gender_lean: any

  # — Extensions: grandparents + extended family
  - id: grandpa_gift_buyer
    name: "Grandpa Gift Buyer"
    family_role: grandparent
    gender_lean: male
  - id: aunt_uncle_gifter
    name: "Aunt / Uncle Gift Giver"
    family_role: extended_family
    gender_lean: any
  - id: godparent_gifter
    name: "Godparent Gift Giver"
    family_role: extended_family
    gender_lean: any

  # — Extensions: special-occasion gift mindsets
  - id: birthday_party_host
    name: "Birthday Party Host (kids' party parent)"
    family_role: parent
    gender_lean: any
  - id: holiday_gifter
    name: "Holiday Gift Giver (Xmas/Hanukkah/etc.)"
    family_role: any
    gender_lean: any
  - id: teacher_end_of_year_gifter
    name: "Teacher End-of-Year Gift Giver"
    family_role: parent
    gender_lean: any

  # — Extensions: adult self-purchase
  - id: adult_self_reward
    name: "Adult Self-Reward Colorer (stress-relief)"
    family_role: self
    gender_lean: any

# Voice families. AGENTS.md lists 4 "start with"; scale only voices
# that outperform baseline. Kept at 4 until data supports expansion.
voice_families:
  - warm_conversational_female
  - upbeat_female
  - calm_premium_female
  - friendly_gift_guide

# Content Formats To Rotate — includes the 13 patterns from AGENTS.md
# "Content Formats To Rotate" (family_photos_reveal + screen_free_mom_pov
# were previously missing from this file).
formats:
  - before_after
  - talking_head
  - family_photos_reveal
  - screen_free_mom_pov
  - sibling_angle
  - grandparent_gift
  - birthday_angle
  - vacation_angle
  - print_flipthrough
  - slideshow_narration
  - proof_montage
  - faq_objection
  - comparison_generic_books

kpi_targets:
  landing_page_opt_in_rate: 0.20
  sample_to_purchase_rate: 0.10
  print_attach_rate: 0.35
  sibling_bundle_attach_rate: 0.25
  free_sample_cpl_target: 6
  creator_affiliate_cac_target: 20
  cold_paid_cac_target: 30
  blended_cac_target: 25

# Explore vs Exploit — AGENTS.md bandit allocation. Use early_account
# defaults until the account has sustained purchase volume.
allocation:
  mature_account:
    exploit: 0.70
    adjacent: 0.20
    explore: 0.10
  early_account:
    exploit: 0.50
    adjacent: 0.30
    explore: 0.20

winner_rules:
  organic:
    - "top_20_percent_hook_rate"
    - "above_median_watch_through"
    - "above_median_shares_saves"
    - "strong_profile_or_link_clicks"
  paid:
    - "thumbstop_above_baseline"
    - "ctr_above_baseline"
    - "free_sample_cpl_below_target"
    - "purchase_cac_below_target_or_trending"

kill_rules:
  - "bottom_quartile_hook_rate_after_sufficient_views"
  - "comments_show_confusion_or_distrust"
  - "weak_product_truth"
  - "cpl_materially_above_target_with_no_recovery"
  - "same_angle_loses_three_times_without_meaningful_change"

required_asset_metadata:
  - platform
  - funnel_stage
  - pillar
  - occasion
  - hook_id
  - angle_id
  - format_id
  - avatar_id
  - voice_id
  - cta_id
  - offer_id
  - page_count_offer
  - print_or_pdf
  - bundle_offer
  - duration_bucket
  - music_style
  - visual_style
  - publish_date
